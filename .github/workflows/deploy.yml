name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

env:
  CI: false  # Penting: mencegah warning jadi error [citation:2]
  # Environment variables untuk build
  REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
  REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
  REACT_APP_FIREBASE_DATABASE_URL: ${{ secrets.REACT_APP_FIREBASE_DATABASE_URL }}
  REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
  REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
  REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
  REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout kode dari repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci
        
      # 4. Build aplikasi (dengan environment variables dari secrets)
      - name: Build Application
        run: npm run build
        
      # 5. Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
        
      # 6. Deploy ke Firebase Hosting
      - name: Deploy to Firebase Hosting
        run: firebase deploy --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
        
      # 7. (Opsional) Verifikasi deployment
      - name: Verify Deployment
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 https://savings-app.web.app"