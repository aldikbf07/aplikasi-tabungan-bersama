<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/heart.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4a6cf7" />
    <meta
      name="description"
      content="Aplikasi pencatatan tabungan bersama"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/heart.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Add fallback jika manifest error -->
    <link rel="manifest" href="/manifest.json" />
    <title>Tabungan kita - Aplikasi Tabungan Bersama</title>
  </head>
  <body>
    <noscript>Anda perlu mengaktifkan JavaScript untuk menjalankan aplikasi ini.</noscript>
    <div id="root"></div>
    <!-- Register service worker with error handling -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js')
            .then(function(registration) {
              console.log('✅ ServiceWorker registration successful:', registration);
            })
            .catch(function(error) {
              console.warn('⚠️ ServiceWorker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
