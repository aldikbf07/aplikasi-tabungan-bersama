<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - TabunganKu</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f7fa;
      padding: 20px;
    }
    .offline-container {
      text-align: center;
      max-width: 400px;
    }
    .offline-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      color: #1a1a2e;
      margin-bottom: 10px;
    }
    p {
      color: #6b7280;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .retry-btn {
      padding: 12px 32px;
      background: #4a6cf7;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .retry-btn:hover {
      background: #3b5de7;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📶</div>
    <h1>Koneksi Terputus</h1>
    <p>Maaf, Anda sedang offline. Silakan periksa koneksi internet Anda dan coba lagi.</p>
    <button class="retry-btn" onclick="location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
